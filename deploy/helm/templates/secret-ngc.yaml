{{- if and (include "rtdt.aeronimEnabled" .) .Values.ngcSecret.create -}}
{{- if not .Values.ngcSecret.apiKey -}}
{{- fail "ngcSecret.create is true but ngcSecret.apiKey is empty. Pass --set-string ngcSecret.apiKey=$NGC_API_KEY at install time (or deploy.sh will forward it for you), or set ngcSecret.create=false and pre-create the secrets out of band." -}}
{{- end -}}
---
# Opaque secret consumed as NGC_API_KEY env on the kit and aeronim containers.
# Uses stringData so the Kubernetes API handles base64 encoding. For production,
# prefer ngcSecret.create=false and manage this secret out of band so the API key
# is not rendered into the Helm release record.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rtdt.ngcApiSecretName" . }}
  labels:
    {{- include "rtdt.labels" . | nindent 4 }}
type: Opaque
stringData:
  NGC_API_KEY: {{ .Values.ngcSecret.apiKey | quote }}
---
# dockerconfigjson secret used by the aeronim pod to pull from nvcr.io.
# NGC uses the literal username `$oauthtoken` with the API key as the password.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.global.ngcImagePullSecretName }}
  labels:
    {{- include "rtdt.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: {{ printf `{"auths":{"nvcr.io":{"username":"$oauthtoken","password":%q,"auth":%q}}}` .Values.ngcSecret.apiKey (printf "$oauthtoken:%s" .Values.ngcSecret.apiKey | b64enc) | quote }}
{{- end }}
