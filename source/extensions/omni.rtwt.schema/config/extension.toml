[core]
reloadable = false
order = -100  # Load at the start, load all schemas with order -100 (with order -1000 the USD libs are loaded)

[package]
title = "RTWT USD Schema"
version = "2.0.0"  # Semantic Versioning is used: https://semver.org/
description = "USD Schema for RTWT"
category = "Example"  # How to categorize this in the Extension Manager
changelog = "docs/CHANGELOG.md"
icon = "data/icon.png"  # Icon to show in the Extension Manager
keywords = ["kit", "example", "extension"]  # Search keywords for the Extension Manager
readme  = "docs/README.md"  # Path (relative to the root) or content of readme markdown file for UI

[dependencies]
"omni.usd.libs" = {}

[[python.module]]  # Main python module this extension provides, it will be publicly available as "import omni.rtwt.schema"
name = "omni.rtwt.schema"

