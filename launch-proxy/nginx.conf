# Launch proxy for the RTDT Blueprint.
#
# Fronts two upstreams behind a single host:
#   - `web` (Trame app) serves the UI at `/`.
#   - `kit-stream` (Kit app) handles the WebRTC signaling handshake at `/sign_in`.
# After `/sign_in`, the browser opens a direct WebRTC session to kit-stream; only
# the signaling request transits this proxy.
#
# A self-signed cert is generated by entrypoint.sh on first start if no cert is
# mounted at /etc/nginx/tls/. Both :80 and :443 are exposed so deployments can
# choose plain HTTP (local/dev) or TLS (Brev/cloud) without rebuilding.

worker_processes auto;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  # Streaming uploads/downloads (USD assets, sim payloads) can be large — disable the cap.
  client_max_body_size 0;
  keepalive_timeout 65;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_certificate /etc/nginx/tls/cert.pem;
  ssl_certificate_key /etc/nginx/tls/key.pem;

  log_format proxy '$remote_addr - $host "$request" $status '
                   'upgrade="$http_upgrade" connection="$connection_upgrade" '
                   'upstream="$upstream_addr" upstream_status="$upstream_status"';

  access_log /var/log/nginx/access.log proxy;
  error_log /var/log/nginx/error.log;

  gzip on;
  gzip_disable "msie6";

  # Translate the client's `Upgrade` header into the right `Connection` value so
  # WebSocket / HTTP upgrade requests (Trame, Kit signaling) tunnel correctly.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
  }

  upstream rtdt_web {
    server web:5173;
  }

  upstream rtdt_kit {
    server kit-stream:49100;
  }

  # --- HTTP (port 80) -------------------------------------------------------
  # Shared proxy settings between :80 and :443 are duplicated rather than
  # factored into an include — keeps the config greppable and self-contained.
  server {
    listen 80 default_server;
    listen [::]:80 default_server;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Disable buffering so streaming responses (server-sent events, long polls)
    # reach the client without being held back.
    proxy_buffering off;
    proxy_redirect off;

    # Kit signaling endpoint — long timeout because the handshake may stall
    # while the Kit app finishes booting.
    location = /sign_in {
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_pass http://rtdt_kit/sign_in;
    }

    # Everything else goes to the Trame web UI (including its websocket channel).
    location / {
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_pass http://rtdt_web;
    }
  }

  # --- HTTPS (port 443) -----------------------------------------------------
  server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_redirect off;

    location = /sign_in {
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_pass http://rtdt_kit/sign_in;
    }

    location / {
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_pass http://rtdt_web;
    }
  }
}
